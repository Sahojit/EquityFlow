name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Type-check with mypy
        run: uv run mypy llm/ agents/ graph/ api/

      - name: Run tests with pytest
        env:
          GROQ_API_KEY: "gsk_dummy_ci_token"
          TAVILY_API_KEY: "tvly_dummy_ci_key"
          LANGFUSE_PUBLIC_KEY: "pk_dummy"
          LANGFUSE_SECRET_KEY: "sk_dummy"
          LANGFUSE_HOST: "https://cloud.langfuse.com"
          DATABASE_URL: "sqlite:///./alpha_agents_ci.db"
          CHROMADB_PATH: "/tmp/chroma_ci"
          PRIMARY_MODEL: "meta-llama/Llama-3.1-8B-Instruct"
          FALLBACK_MODEL: "mistralai/Mistral-7B-Instruct-v0.3"
          MAX_REVISION_LOOPS: "2"
        run: uv run pytest tests/ --cov=. --cov-report=xml -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
